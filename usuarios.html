<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursorama - Usuários</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>

<body>

    <nav class="navbar bg-dark navbar-expand-lg bg-body-tertiary border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">
                <img src="./img/school_24dp_F19E39_FILL0_wght400_GRAD0_opsz24.svg" alt="Logo" width="30" height="24"
                    class="d-inline-block align-text-top">
                Cursorama
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="./usuarios.html" class="nav-link active">Usuários</a></li>
                    <li class="nav-item"><a href="./cursos.html" class="nav-link">Cursos</a></li>
                    <li class="nav-item"><a href="./trilhas.html" class="nav-link">Trilhas</a></li>
                    <li class="nav-item"><a href="./progresso.html" class="nav-link">Progresso</a></li>
                    <li class="nav-item"><a href="./financeiro.html" class="nav-link">Financeiro</a></li>
                    <li class="nav-item"><a href="./sobre.html" class="nav-link">Sobre</a></li>
                    <li class="nav-item"><a href="./contato.html" class="nav-link">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Gestão de Usuários e Matrículas</h2>
        <hr>
    </div>

    <div class="container mt-4">
        <div class="row g-4">
            <!-- Cadastro de Usuário -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100 border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Cadastrar Usuário</h5>
                    </div>
                    <div class="card-body">
                        <form id="formUsuario">
                            <div class="row g-3">
                                <div class="col-12">
                                    <input type="text" id="nomeCompleto" class="form-control" placeholder="Nome Completo" required>
                                </div>
                                <div class="col-12">
                                    <input type="email" id="email" class="form-control" placeholder="E-mail" required>
                                </div>
                                <div class="col-12">
                                    <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary">Cadastrar Usuário</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Matrícula -->
            <div class="col-md-6">
                <div class="card shadow-sm h-100 border-success">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Matricular Usuário em Curso</h5>
                    </div>
                    <div class="card-body">
                        <form id="formMatricula">
                            <div class="row g-3">
                                <div class="col-12">
                                    <select id="selectUsuarioMatricula" class="form-control" required>
                                        <option value="">Selecione o Usuário</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <select id="selectCursoMatricula" class="form-control" required>
                                        <option value="">Selecione o Curso</option>
                                    </select>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-success">Efetuar Matrícula</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabelas -->
    <div class="container mt-5 mb-5">
        <div class="row g-4">
            <div class="col-md-6">
                <h4 class="text-primary">Usuários Cadastrados</h4>
                <div class="table-responsive">
                    <table class="table table-striped table-hover mt-2">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Data Cadastro</th>
                            </tr>
                        </thead>
                        <tbody id="listaUsuarios"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-6">
                <h4 class="text-success">Matrículas Ativas</h4>
                <div class="table-responsive">
                    <table class="table table-striped table-hover mt-2">
                        <thead class="table-dark">
                            <tr>
                                <th>Aluno</th>
                                <th>Curso</th>
                                <th>Data Matrícula</th>
                            </tr>
                        </thead>
                        <tbody id="listaMatriculas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/db.js"></script>
    <script src="./js/usuarios.js"></script>
</body>

</html>
